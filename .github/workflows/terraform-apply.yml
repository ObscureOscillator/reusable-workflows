name: Terraform Apply

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Terraform configuration"
        type: string
        default: "."
      environment:
        description: "Deployment environment (e.g. dev, staging, prod)"
        type: string
        required: true
        default: "prod"
      aws-region:
        description: "AWS region for the S3 state backend"
        type: string
        default: "us-east-1"
    secrets:
      GH_TOKEN:
        required: true
      AWS_ACCESS_KEY:
        required: true
      AWS_ACCESS_SECRET:
        required: true

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    outputs:
      terraform-version: ${{ steps.check_tf_version.outputs.terraform-version }}
      has-changes: ${{ steps.plan.outputs.exitcode == '2' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}
          aws-region: ${{ inputs.aws-region }}

      - name: Check for .terraform-version file
        id: check_tf_version
        run: |
          if [ -f ".terraform-version" ]; then
            echo "Terraform version file found. Setting terraform-version input to the specified version."
            echo "terraform-version=$(cat .terraform-version)" >> $GITHUB_OUTPUT
          else
            echo "No .terraform-version file found. Using default terraform-version input."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ steps.check_tf_version.outputs.terraform-version }}

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=awsjlb-tfstate" \
            -backend-config="key=${{ github.event.repository.name }}/${{ inputs.environment }}.tfstate" \
            -backend-config="region=${{ inputs.aws-region }}" \
            -backend-config="encrypt=true"

      - name: Terraform Fmt
        id: fmt
        run: terraform fmt -check -no-color

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set +e
          terraform plan -no-color -detailed-exitcode -out=tfplan
          TF_EXIT_CODE=$?
          echo "exitcode=$TF_EXIT_CODE" >> $GITHUB_OUTPUT
          if [ "$TF_EXIT_CODE" -eq 1 ]; then
            exit 1
          fi
          exit 0
        continue-on-error: true

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: ${{ inputs.working-directory }}/tfplan
          retention-days: 1

      - name: Post Plan Summary
        uses: actions/github-script@v9
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          script: |
            const output = `#### Terraform Plan \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Triggered by: @${{ github.actor }}, Working directory: \`${{ inputs.working-directory }}\`*`;

            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: output
            });

      - name: Terraform Plan Status
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan
    if: needs.terraform-plan.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}
          aws-region: ${{ inputs.aws-region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ needs.terraform-plan.outputs.terraform-version }}

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=awsjlb-tfstate" \
            -backend-config="key=${{ github.event.repository.name }}/${{ inputs.environment }}.tfstate" \
            -backend-config="region=${{ inputs.aws-region }}" \
            -backend-config="encrypt=true"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v7
        with:
          name: tfplan
          path: ${{ inputs.working-directory }}

      - name: Terraform Apply
        id: apply
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: terraform apply -no-color -auto-approve tfplan
        continue-on-error: true

      - name: Post Apply Summary
        uses: actions/github-script@v9
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          script: |
            const output = `#### Terraform Apply \`${{ steps.apply.outcome }}\`
            <details><summary>Show Apply Output</summary>

            \`\`\`\n
            ${{ steps.apply.outputs.stdout }}
            \`\`\`

            </details>

            *Triggered by: @${{ github.actor }}, Working directory: \`${{ inputs.working-directory }}\`*`;

            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: output
            });

      - name: Terraform Apply Status
        if: steps.apply.outcome == 'failure'
        run: exit 1
