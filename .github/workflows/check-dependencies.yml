name: "Renovate: Check Dependencies"

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  renovate:
    name: Renovate Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Renovate using Personal Access Token
      # Create a GitHub access token with 'repository' read/write scope
      # Add it as RENOVATE_TOKEN secret in repository settings
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.11
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          LOG_LEVEL: "${{ github.event.inputs.logLevel || 'info' }}"
          RENOVATE_DRY_RUN: "${{ github.event.inputs.dryRun || 'false' }}"
          RENOVATE_PLATFORM: github
          RENOVATE_AUTODISCOVER: false
          RENOVATE_REPOSITORIES: ${{ github.repository }}
