name: Terraform Plan

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Terraform configuration"
        type: string
        default: "."
      environment:
        description: "Deployment environment (e.g. dev, staging, prod)"
        type: string
        required: false
    secrets:
      GH_TOKEN:
        required: true
      

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for .terrform-version file
        id: check_tf_version
        run: |
          if [ -f ".terraform-version" ]; then
            echo "Terraform version file found. Setting terraform-version input to the specified version."
            echo "terraform-version=$(cat .terraform-version)" >> $GITHUB_OUTPUT
          else
            echo "No .terraform-version file found. Using default terraform-version input."
            exit 1
          fi
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ steps.check_tf_version.outputs.terraform-version }}

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Fmt
        id: fmt
        run: terraform fmt -check -no-color
        
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Post Plan Summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Triggered by: @${{ github.actor }}, Working directory: \`${{ inputs.working-directory }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
