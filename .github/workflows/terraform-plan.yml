name: Terraform Plan

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Terraform configuration"
        type: string
        default: "."
      environment:
        description: "Deployment environment (e.g. dev, staging, prod)"
        type: string
        required: true
        default: "prod"
      aws-region:
        description: "AWS region for the S3 state backend"
        type: string
        default: "us-east-1"
    secrets:
      GH_TOKEN:
        required: true
      AWS_ACCESS_KEY:
        required: true
      AWS_ACCESS_SECRET:
        required: true
      

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}
          aws-region: ${{ inputs.aws-region }}

      - name: Check for .terrform-version file
        id: check_tf_version
        run: |
          if [ -f ".terraform-version" ]; then
            echo "Terraform version file found. Setting terraform-version input to the specified version."
            echo "terraform-version=$(cat .terraform-version)" >> $GITHUB_OUTPUT
          else
            echo "No .terraform-version file found. Using default terraform-version input."
            exit 1
          fi
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ steps.check_tf_version.outputs.terraform-version }}

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=awsjlb-tfstate" \
            -backend-config="key=${{ github.event.repository.name }}/${{ inputs.environment }}.tfstate" \
            -backend-config="region=${{ inputs.aws-region }}" \
            -backend-config="encrypt=true"

      - name: Terraform Fmt
        id: fmt
        run: terraform fmt -check -no-color

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Post Plan Summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          script: |
            const output = `#### Terraform Plan \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Triggered by: @${{ github.actor }}, Working directory: \`${{ inputs.working-directory }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
